version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: igcreator-db
    environment:
      POSTGRES_USER: igcreator
      POSTGRES_PASSWORD: igcreator_dev
      POSTGRES_DB: igcreator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igcreator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: igcreator-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
